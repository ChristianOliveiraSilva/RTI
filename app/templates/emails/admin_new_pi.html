<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h2 style="color: #1a5c2e;">{{ app_name }}</h2>
  <hr style="border: none; border-top: 2px solid #1a5c2e;">

  <p>Uma nova Propriedade Intelectual foi registrada no sistema:</p>

  <table style="border-collapse: collapse; width: 100%; margin: 16px 0;">
    <tr>
      <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">Título</td>
      <td style="padding: 8px; border: 1px solid #ddd;">{{ pi_title }}</td>
    </tr>
    <tr>
      <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">Tipo</td>
      <td style="padding: 8px; border: 1px solid #ddd;">{{ pi_type }}</td>
    </tr>
    <tr>
      <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">Responsável</td>
      <td style="padding: 8px; border: 1px solid #ddd;">{{ owner_name }} ({{ owner_email }})</td>
    </tr>
  </table>

  <p>
    <a href="{{ base_url }}/pis/{{ pi_id }}" style="display: inline-block; padding: 10px 20px; background: #1a5c2e; color: white; text-decoration: none; border-radius: 4px;">
      Ver PI no sistema
    </a>
  </p>

  <p style="color: #666; font-size: 12px; margin-top: 30px;">
    Este é um email automático do sistema {{ app_name }}.
  </p>
</body>
</html>
