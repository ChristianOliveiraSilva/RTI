<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Registro de PI - IFMS{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="/dashboard">
        <span class="brand-mark">PI</span>
        <span class="brand-text">Registro de Propriedade Intelectual</span>
      </a>
      <nav class="topnav">
        {% if request.session.get("user_id") %}
          <a href="/dashboard">Dashboard</a>
          <a href="/pis/new" class="btn btn-primary btn-sm">Nova PI</a>
          <a href="/logout" class="muted">Sair</a>
        {% else %}
          <a href="/login">Entrar</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="container main">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="container">
      <small>&copy; {{ 2026 }} IFMS - Registro de Propriedade Intelectual</small>
    </div>
  </footer>
</body>
</html>
