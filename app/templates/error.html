{% extends "base.html" %}
{% block title %}Erro {{ status_code }}{% endblock %}
{% block content %}
<div class="centered-card">

    <div class="error-icon">!</div>
    <h1>{{ status_code }}</h1>

  </div>
</div>
{% endblock %}
