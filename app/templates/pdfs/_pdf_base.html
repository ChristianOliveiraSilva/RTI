<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>{% block title %}Anexo{% endblock %}</title>
<style>
  @page { size: A4; margin: 2cm; }
  * { box-sizing: border-box; }
  body { font-family: "DejaVu Sans", "Liberation Sans", Arial, sans-serif; font-size: 11pt; color: #111; line-height: 1.45; }
  h1 { text-align: center; font-size: 14pt; margin: 0 0 6pt 0; }
  h2 { font-size: 12pt; margin: 12pt 0 4pt; border-bottom: 1px solid #999; padding-bottom: 2pt; }
  .header { text-align: center; margin-bottom: 18pt; }
  .header .org { font-size: 10pt; color: #555; }
  .meta { font-size: 9pt; color: #555; text-align: right; margin-bottom: 4pt; }
  table { width: 100%; border-collapse: collapse; margin: 8pt 0 4pt; }
  th, td { border: 1px solid #888; padding: 4pt 6pt; text-align: left; vertical-align: top; font-size: 10pt; }
  th { background: #eef2f7; }
  .small { font-size: 9pt; color: #666; }
  .signature { margin-top: 36pt; text-align: center; }
  .signature .line { border-top: 1px solid #000; width: 60%; margin: 0 auto 4pt; padding-top: 4pt; }
  .field { margin: 4pt 0; }
  .label { font-weight: bold; }
  .text-justify { text-align: justify; }
  ul { margin: 4pt 0 4pt 18pt; }
</style>
</head>
<body>
  <div class="header">
    <div class="org">INSTITUTO FEDERAL DE EDUCAÇÃO, CIÊNCIA E TECNOLOGIA<br>NÚCLEO DE INOVAÇÃO TECNOLÓGICA - NIT</div>
    <h1>{% block heading %}{% endblock %}</h1>
  </div>
  <div class="meta">Gerado em {{ now.strftime("%d/%m/%Y %H:%M") }}</div>
  {% block body %}{% endblock %}
</body>
</html>
